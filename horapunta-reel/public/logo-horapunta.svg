<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');
      text {
        font-family: 'Inter', 'Arial Black', 'Helvetica Neue', sans-serif;
        font-weight: 900;
        letter-spacing: -0.06em;
        text-transform: uppercase;
        dominant-baseline: auto;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A0A"/>

  <!-- HORA (white) -->
  <text
    x="540"
    y="490"
    fill="#FFFFFF"
    font-size="220"
    text-anchor="middle"
  >HORA</text>

  <!-- PUNTA (orange-red) -->
  <text
    x="540"
    y="700"
    fill="#FF4500"
    font-size="220"
    text-anchor="middle"
  >PUNTA</text>
</svg>
