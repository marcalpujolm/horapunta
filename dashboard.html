<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hora Punta — Dashboard Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
/* ── ROOT ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#f4f1ea; --black:#0d0d0d; --red:#c9222a;
  --gris:#6b6560; --border:rgba(13,13,13,0.08);
  --dash:#eceae4; --card:#ffffff;
  --fs:'Fraunces',serif; --fi:'Inter',sans-serif; --fm:'JetBrains Mono',monospace
}
body{font-family:var(--fi);background:var(--dash);color:var(--black);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── HEADER ── */
.dash-header{
  position:sticky;top:0;z-index:500;background:var(--card);
  border-bottom:1px solid var(--border);padding:18px 40px;
  display:flex;justify-content:space-between;align-items:center
}
.dash-logo{font-family:var(--fs);font-size:17px;font-weight:400;letter-spacing:-0.02em;color:var(--black)}
.dash-logo span{color:var(--red)}
.dash-tabs{display:flex;gap:2px;background:var(--dash);border-radius:8px;padding:4px}
.tab-btn{
  background:none;border:none;cursor:pointer;padding:7px 18px;border-radius:6px;
  font-family:var(--fi);font-size:12px;font-weight:600;letter-spacing:0.04em;
  text-transform:uppercase;color:var(--gris);transition:all 0.2s
}
.tab-btn.active{background:var(--card);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.dash-zips{display:flex;gap:10px;align-items:center}
.btn-zip{
  background:var(--black);color:#fff;border:none;cursor:pointer;
  padding:9px 18px;border-radius:5px;font-family:var(--fi);
  font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  transition:all 0.2s
}
.btn-zip:hover{background:var(--red)}
.btn-zip:disabled{opacity:0.45;cursor:not-allowed}
.btn-zip.secondary{background:var(--dash);color:var(--black);border:1px solid var(--border)}
.btn-zip.secondary:hover{background:var(--black);color:#fff;border-color:var(--black)}

/* ── BODY ── */
.dash-section{display:none;padding:40px}
.dash-section.visible{display:block}
.day-block{margin-bottom:56px}
.day-header{
  display:flex;align-items:center;gap:14px;margin-bottom:20px;
  padding-bottom:14px;border-bottom:1px solid var(--border)
}
.day-name{font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--gris)}
.day-sep{flex:1;height:1px;background:var(--border)}
.day-count{font-family:var(--fm);font-size:9px;color:rgba(13,13,13,0.3);letter-spacing:0.08em}
.pieces-row{display:flex;flex-wrap:wrap;gap:16px}

/* ── SECTION TITLE ── */
.section-title{
  font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--gris);margin-bottom:24px;
  padding-bottom:14px;border-bottom:1px solid var(--border)
}

/* ── CARD ── */
.piece-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s,transform 0.2s;
  display:flex;flex-direction:column
}
.piece-card:hover{border-color:rgba(13,13,13,0.16);box-shadow:0 4px 20px rgba(0,0,0,0.07);transform:translateY(-1px)}
.card-top{
  padding:9px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:8px
}
.card-label{font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tag{font-family:var(--fm);font-size:9px;color:var(--red);letter-spacing:0.06em;flex-shrink:0}
.card-preview{position:relative;overflow:hidden;cursor:default}
.card-hover{
  position:absolute;inset:0;opacity:0;transition:opacity 0.2s;
  display:flex;align-items:flex-end;justify-content:flex-start;padding:10px;
  pointer-events:none
}
.card-preview:hover .card-hover{opacity:1}
.card-hint-text{
  background:rgba(13,13,13,0.85);color:#fff;font-family:var(--fm);
  font-size:8px;font-weight:500;padding:4px 10px;border-radius:100px;
  letter-spacing:0.08em;text-transform:uppercase
}
.card-bottom{
  padding:8px 12px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:7px;align-items:center
}
.btn-action{
  background:none;color:var(--black);border:1px solid var(--border);
  cursor:pointer;padding:5px 12px;border-radius:4px;font-family:var(--fi);
  font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  transition:all 0.2s
}
.btn-action:hover{background:var(--black);color:#fff;border-color:var(--black)}
.btn-action.red:hover{background:var(--red);border-color:var(--red)}
.btn-action:disabled{opacity:0.4;cursor:not-allowed}

/* ── ARTWORK ── */
.artwork{position:relative;overflow:hidden;font-family:var(--fi);flex-shrink:0}
.artwork.post{width:270px;height:270px}
.artwork.story{width:270px;height:480px}
.artwork.cream{background:var(--cream)}
.artwork.photo-bg-wrap{background:var(--black)}
.artwork.capturing [contenteditable]{outline:none!important}

/* ── EDITABLE ── */
[contenteditable="true"]{outline:none;display:block;border-radius:2px;transition:outline 0.12s}
[contenteditable="true"]:hover{outline:1px dashed rgba(201,34,42,0.4);outline-offset:1px;cursor:text}
[contenteditable="true"]:focus{outline:1.5px solid var(--red);outline-offset:1px}

/* ── ATOMS ── */
.a-logo{position:absolute;top:14px;left:16px;font-family:var(--fs);font-size:9px;font-weight:400;letter-spacing:-0.01em;color:rgba(13,13,13,0.35)}
.a-logo span{color:var(--red)}
.a-logo.w{color:rgba(255,255,255,0.45)}
.a-logo.w span{color:rgba(255,255,255,0.7)}
.a-slide{position:absolute;top:15px;right:16px;font-family:var(--fm);font-size:7px;letter-spacing:0.1em;color:rgba(13,13,13,0.28)}
.a-slide.w{color:rgba(255,255,255,0.3)}
.a-sig{position:absolute;bottom:13px;left:16px;font-family:var(--fm);font-size:6.5px;letter-spacing:0.12em;color:rgba(13,13,13,0.28)}
.a-sig.w{color:rgba(255,255,255,0.3)}
.a-sig.r{left:auto;right:16px}
.a-red-bar{position:absolute;top:0;left:0;right:0;height:2px;background:var(--red)}
.a-red-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-right:8px;vertical-align:middle}
.a-line{width:24px;height:1px;margin-bottom:10px}
.a-line.dark{background:rgba(13,13,13,0.2)}
.a-line.light{background:rgba(255,255,255,0.25)}
.a-ghost{position:absolute;font-family:var(--fs);font-weight:700;font-size:80px;letter-spacing:-0.06em;line-height:1;color:rgba(13,13,13,0.04);user-select:none;pointer-events:none}

/* ── PHOTO OVERLAY ── */
.p-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.p-ov{position:absolute;inset:0}
.p-ov.b2t{background:linear-gradient(to top,rgba(13,13,13,0.85) 0%,rgba(13,13,13,0.35) 55%,rgba(13,13,13,0.05) 100%)}
.p-ov.t2b{background:linear-gradient(to bottom,rgba(13,13,13,0.75) 0%,rgba(13,13,13,0.1) 60%,rgba(13,13,13,0) 100%)}
.p-ov.mid{background:rgba(13,13,13,0.45)}
.p-ov.heavy{background:rgba(13,13,13,0.6)}

/* ── SEMANAL LAYOUTS ── */

/* Cover */
.ly-cover{position:absolute;bottom:36px;left:18px;right:18px}
.ly-cover .tag{font-family:var(--fm);font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--red);margin-bottom:10px;display:block}
.ly-cover .hl{font-family:var(--fs);font-size:28px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic}
.ly-cover .hl em{font-style:normal;font-weight:700}

/* Numbered */
.ly-num{position:absolute;top:46px;bottom:30px;left:18px;right:18px;display:flex;flex-direction:column;justify-content:space-between}
.ly-num .num-tag{font-family:var(--fm);font-size:8px;font-weight:500;letter-spacing:0.1em;color:var(--red);margin-bottom:10px}
.ly-num .hl{font-family:var(--fs);font-size:21px;font-weight:400;line-height:1.1;letter-spacing:-0.025em;color:var(--black)}
.ly-num .body{font-family:var(--fi);font-size:10px;font-weight:300;color:var(--gris);line-height:1.7;letter-spacing:0.01em}

/* Resolution */
.ly-res{position:absolute;bottom:34px;left:18px;right:18px}
.ly-res .pre{font-family:var(--fm);font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gris);margin-bottom:12px;display:block}
.ly-res .hl-light{font-family:var(--fs);font-size:22px;font-weight:300;line-height:1.05;letter-spacing:-0.025em;color:rgba(13,13,13,0.45);font-style:italic;margin-bottom:4px}
.ly-res .hl-bold{font-family:var(--fs);font-size:26px;font-weight:700;line-height:1.0;letter-spacing:-0.035em;color:var(--red);margin-bottom:14px}
.ly-res .brand{font-family:var(--fm);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(13,13,13,0.35)}

/* Statement */
.ly-stmt{position:absolute;top:50%;left:18px;right:18px;transform:translateY(-50%)}
.ly-stmt .hl{font-family:var(--fs);font-size:34px;font-weight:700;line-height:0.97;letter-spacing:-0.04em;color:var(--black)}
.ly-stmt .hl em{font-style:italic;font-weight:300;color:var(--gris)}
.ly-stmt .cta{margin-top:16px;font-family:var(--fi);font-size:9px;font-weight:500;color:var(--gris);letter-spacing:0.08em;text-transform:uppercase}

/* Insight */
.ly-insight{position:absolute;top:50%;left:18px;right:18px;transform:translateY(-50%)}
.ly-insight .pre{font-family:var(--fm);font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:block}
.ly-insight .hl{font-family:var(--fs);font-size:28px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic}

/* CTA */
.ly-cta{position:absolute;top:50%;left:18px;right:18px;transform:translateY(-50%)}
.ly-cta .num{font-family:var(--fs);font-size:52px;font-weight:700;line-height:1;letter-spacing:-0.05em;color:rgba(13,13,13,0.07);margin-bottom:6px}
.ly-cta .hl{font-family:var(--fs);font-size:26px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic;margin-bottom:14px}
.ly-cta .link{font-family:var(--fi);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red)}

/* Photo post */
.ly-photo{position:absolute;bottom:28px;left:18px;right:18px;z-index:3}
.ly-photo .slide-tag{font-family:var(--fm);font-size:7.5px;letter-spacing:0.1em;color:rgba(255,255,255,0.45);margin-bottom:8px;display:block}
.ly-photo .hl{font-family:var(--fs);font-size:28px;font-weight:700;line-height:1.0;letter-spacing:-0.035em;color:#fff}
.ly-photo .sub{font-family:var(--fi);font-size:10px;font-weight:300;color:rgba(255,255,255,0.55);margin-top:7px;line-height:1.5}

/* Story text */
.ly-stxt{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%)}
.ly-stxt .pre{font-family:var(--fm);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:block}
.ly-stxt .hl{font-family:var(--fs);font-size:30px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic;margin-bottom:12px}
.ly-stxt .body{font-family:var(--fi);font-size:12px;font-weight:300;color:var(--gris);line-height:1.65}

/* Story poll */
.ly-spoll{position:absolute;bottom:50px;left:20px;right:20px}
.ly-spoll .q{font-family:var(--fs);font-size:26px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic;margin-bottom:22px}
.poll-opt{border:1px solid rgba(13,13,13,0.18);border-radius:7px;padding:11px 14px;font-family:var(--fi);font-size:12px;font-weight:500;color:var(--black);text-align:center;margin-bottom:8px}
.poll-opt.fill{background:var(--black);color:#fff;border-color:var(--black)}

/* Story photo */
.ly-sphoto{position:absolute;bottom:50px;left:20px;right:20px;z-index:3}
.ly-sphoto .hl{font-family:var(--fs);font-size:28px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:#fff;font-style:italic;margin-bottom:10px}
.ly-sphoto .body{font-family:var(--fi);font-size:12px;font-weight:300;color:rgba(255,255,255,0.6);line-height:1.6}

/* Story question */
.ly-sq{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%)}
.ly-sq .pre{font-family:var(--fm);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:block}
.ly-sq .q{font-family:var(--fs);font-size:26px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic;margin-bottom:20px}
.open-box{border:1px solid rgba(13,13,13,0.14);border-radius:7px;padding:12px 14px;font-family:var(--fi);font-size:11px;color:rgba(13,13,13,0.28);font-style:italic}

/* Story CTA */
.ly-scta{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%)}
.ly-scta .pre{font-family:var(--fm);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--red);margin-bottom:16px;display:block}
.ly-scta .hl{font-family:var(--fs);font-size:28px;font-weight:400;line-height:1.05;letter-spacing:-0.03em;color:var(--black);font-style:italic;margin-bottom:8px}
.ly-scta .sub{font-family:var(--fi);font-size:11px;font-weight:300;color:var(--gris);line-height:1.55;margin-bottom:24px}
.cta-pill{display:block;background:var(--black);color:#fff;text-align:center;padding:12px;border-radius:6px;font-family:var(--fi);font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}

/* ── EXTRA LAYOUTS ── */
.ly-extra-b{position:absolute;bottom:28px;left:20px;right:20px;z-index:3}
.ly-extra-t{position:absolute;top:28px;left:20px;right:20px;z-index:3}
.ly-extra-c{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%);z-index:3}
.ly-extra-b .phrase,.ly-extra-t .phrase,.ly-extra-c .phrase{font-family:var(--fs);font-size:24px;font-weight:400;line-height:1.1;letter-spacing:-0.03em;font-style:italic}
.ly-extra-b .phrase.w,.ly-extra-t .phrase.w,.ly-extra-c .phrase.w{color:#fff}
.ly-extra-b .phrase.dk,.ly-extra-t .phrase.dk,.ly-extra-c .phrase.dk{color:var(--black)}
.extra-sig{font-family:var(--fm);font-size:7px;letter-spacing:0.12em;margin-top:10px;display:block}
.extra-sig.w{color:rgba(255,255,255,0.35)}
.extra-sig.dk{color:rgba(13,13,13,0.3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--black);color:#fff;border-radius:7px;padding:12px 20px;font-family:var(--fi);font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateY(10px);opacity:0;pointer-events:none;transition:all 0.25s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<header class="dash-header">
  <div class="dash-logo">Hora<span>Punta</span></div>
  <div class="dash-tabs">
    <button class="tab-btn active" onclick="showTab('semanal',this)">Semanal</button>
    <button class="tab-btn" onclick="showTab('extra',this)">Banc d'imatges</button>
  </div>
  <div class="dash-zips">
    <button class="btn-zip secondary" id="zipExtra" onclick="downloadZip('extra')" style="display:none">ZIP Extra</button>
    <button class="btn-zip secondary" id="zipSemanal" onclick="downloadZip('semanal')">ZIP Semanal</button>
  </div>
</header>

<div class="dash-section visible" id="sec-semanal"></div>
<div class="dash-section" id="sec-extra"></div>
<div class="toast" id="toast"></div>

<script>
/* ── PATHS ── */
const I = {
  sitio:   'imatges/pexels-antonio-garcia-1662060750-28115690.jpg',
  cafe:    'imatges/pexels-novillolapeyra-11284639.jpg',
  joves:   'imatges/pexels-joaquin-carfagna-3131171-20252172.jpg',
  crowd:   'imatges/pexels-nick-gorniok-495871763-35550991.jpg',
  stool:   'imatges/pexels-afra-nur-koc-889858467-20392792.jpg',
  glass:   'imatges/pexels-esrakorkmaz-19723776.jpg',
  door:    'imatges/pexels-brcunel-32094624.jpg',
  street:  'imatges/pexels-nick-gorniok-495871763-35550986.jpg',
  damm:    'imatges/pexels-juantrevilla-28487264.jpg',
  terrace: 'imatges/pexels-bingqian-li-230971044-30036913.jpg'
};

/* ── UTILS ── */
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function showTab(id,btn){
  document.querySelectorAll('.dash-section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('visible');
  btn.classList.add('active');
  document.getElementById('zipSemanal').style.display = id==='semanal'?'':'none';
  document.getElementById('zipExtra').style.display = id==='extra'?'':'none';
}

/* ── SEMANAL DATA ── */
const DAYS = [
  { label:'Dilluns', pieces:[
    { id:'p01', label:'Carrusel principal — 1/5', tag:'Post',
      html:`<div class="artwork post cream">
        <div class="a-logo">Hora<span>Punta</span></div>
        <div class="a-slide">01/05</div>
        <div class="a-ghost" style="bottom:-10px;right:-8px">01</div>
        <div class="ly-cover">
          <span class="tag" contenteditable="true">Hora Punta</span>
          <div class="hl" contenteditable="true">El que ningú t'ha explicat sobre per què el teu local <em>no creix.</em></div>
        </div>
        <div class="a-sig">@horapunta</div>
      </div>`
    },
    { id:'p02', label:'Carrusel principal — 2/5', tag:'Post',
      html:`<div class="artwork post cream">
        <div class="a-logo">Hora<span>Punta</span></div>
        <div class="a-slide">02/05</div>
        <div class="a-ghost" style="bottom:-8px;right:-6px">01</div>
        <div class="ly-num">
          <div>
            <div class="num-tag" contenteditable="true">01</div>
            <div class="hl" contenteditable="true">Tens seguidors. No tens clients. No és el mateix.</div>
          </div>
          <div>
            <div class="a-line dark"></div>
            <div class="body" contenteditable="true">Publicar cada dia no garanteix que ningú arribi al teu local. Mai no ho ha fet.</div>
          </div>
        </div>
        <div class="a-sig">@horapunta</div>
      </div>`
    },
    { id:'p03', label:'Carrusel principal — 3/5', tag:'Post',
      html:`<div class="artwork post cream">
        <div class="a-logo">Hora<span>Punta</span></div>
        <div class="a-slide">03/05</div>
        <div class="a-ghost" style="bottom:-8px;right:-6px">02</div>
        <div class="ly-num">
          <div>
            <div class="num-tag" contenteditable="true">02</div>
            <div class="hl" contenteditable="true">Pagues contingut cada mes. El local segueix igual cada mes.</div>
          </div>
          <div>
            <div class="a-line dark"></div>
            <div class="body" contenteditable="true">El contingut crea presència. No crea trànsit. Són coses molt diferents.</div>
          </div>
        </div>
        <div class="a-sig">@horapunta</div>
      </div>`
    },

/* ── RENDER SEMANAL ── */
function buildCard(p, section) {
  const card = document.createElement('div');
  card.className = 'piece-card';
  card.dataset.id = p.id;
  card.dataset.section = section;
  const isPhoto = !!p.photo;
  card.innerHTML = `
    <div class="card-top">
      <span class="card-label">${p.label}</span>
      <span class="card-tag">${p.tag}</span>
    </div>
    <div class="card-preview" id="prev-${p.id}">
      ${p.html}
      <div class="card-hover"><span class="card-hint-text">Edita el text</span></div>
    </div>
    <div class="card-bottom">
      ${isPhoto ? `<button class="btn-action" onclick="swapImg('${p.id}')">Canviar foto</button>` : ''}
      <button class="btn-action red" id="dl-${p.id}" onclick="dlPiece('${p.id}')">PNG</button>
    </div>`;
  return card;
}

function buildExtraCard(p) {
  const card = document.createElement('div');
  card.className = 'piece-card';
  card.dataset.id = p.id;
  card.dataset.section = 'extra';
  const sigClass = p.tc === 'w' ? 'w' : 'dk';
  card.innerHTML = `
    <div class="card-top">
      <span class="card-label">${p.label}</span>
      <span class="card-tag">Post</span>
    </div>
    <div class="card-preview" id="prev-${p.id}">
      <div class="artwork post photo-bg-wrap" id="art-${p.id}">
        <div class="p-bg" id="bg-${p.id}" style="background-image:url('${p.img}')"></div>
        <div class="p-ov ${p.ov}"></div>
        <div class="a-logo w">Hora<span>Punta</span></div>
        <div class="${p.pos_cls}">
          <div class="phrase ${p.tc}" contenteditable="true">${p.phrase}</div>
          <span class="extra-sig ${sigClass}">@horapunta</span>
        </div>
      </div>
      <div class="card-hover"><span class="card-hint-text">Edita el text</span></div>
    </div>
    <div class="card-bottom">
      <button class="btn-action" onclick="swapImg('${p.id}','bg-${p.id}')">Canviar foto</button>
      <button class="btn-action red" id="dl-${p.id}" onclick="dlPiece('${p.id}')">PNG</button>
    </div>`;
  return card;
}

/* ── SWAP IMAGE ── */
function swapImg(pieceId, bgId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const url = URL.createObjectURL(e.target.files[0]);
    const bgEl = document.getElementById(bgId || 'bg-' + pieceId);
    if (bgEl) bgEl.style.backgroundImage = `url('${url}')`;
  };
  input.click();
}

/* ── EXPORT SINGLE ── */
async function dlPiece(id) {
  const artwork = document.querySelector(`#prev-${id} .artwork`);
  const btn = document.getElementById('dl-'+id);
  const isStory = artwork.classList.contains('story');
  btn.textContent='...'; btn.disabled=true;
  artwork.classList.add('capturing');
  try {
    const canvas = await html2canvas(artwork, {
      scale: 4, useCORS: true, allowTaint: true,
      backgroundColor: null, logging: false,
      width: artwork.offsetWidth, height: artwork.offsetHeight
    });
    artwork.classList.remove('capturing');
    canvas.toBlob(blob => { saveAs(blob, `horapunta-${id}.png`); showToast(`${id}.png descarregat`); });
  } catch(e) { artwork.classList.remove('capturing'); showToast('Error'); }
  btn.textContent='PNG'; btn.disabled=false;
}

/* ── EXPORT ZIP ── */
async function downloadZip(section) {
  const btnId = section === 'semanal' ? 'zipSemanal' : 'zipExtra';
  const btn = document.getElementById(btnId);
  btn.textContent='Generant...'; btn.disabled=true;
  const zip = new JSZip();
  const cards = document.querySelectorAll(`[data-section="${section}"]`);
  let i = 0;
  for (const card of cards) {
    const id = card.dataset.id;
    const artwork = card.querySelector('.artwork');
    if (!artwork) continue;
    artwork.classList.add('capturing');
    try {
      const canvas = await html2canvas(artwork, {
        scale: 4, useCORS: true, allowTaint: true,
        backgroundColor: null, logging: false,
        width: artwork.offsetWidth, height: artwork.offsetHeight
      });
      artwork.classList.remove('capturing');
      const blob = await new Promise(r => canvas.toBlob(r,'image/png'));
      zip.file(`${String(++i).padStart(2,'0')}-${id}.png`, blob);
      showToast(`${i}/${cards.length} processades...`);
    } catch(e) { artwork.classList.remove('capturing'); }
  }
  const zb = await zip.generateAsync({type:'blob'});
  saveAs(zb, `horapunta-${section}.zip`);
  showToast('ZIP descarregat.');
  btn.textContent = section==='semanal' ? 'ZIP Semanal' : 'ZIP Extra';
  btn.disabled = false;
}
