<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hora Punta — Dashboard Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
/* ─── ROOT ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#0A0A0A; --white:#FFFFFF;
  --cream:#F4EFE6; --accent:#FF4500; --accent2:#FF6A33;
  --dark1:#141414; --dark2:#1E1E1E;
  --muted:#888888; --border:rgba(255,255,255,0.08);
  --f:'Inter',system-ui,sans-serif
}
body{font-family:var(--f);background:var(--black);color:var(--white);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ─── NAV ─── */
.dash-nav{
  position:sticky;top:0;z-index:500;
  background:rgba(10,10,10,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:18px 40px;display:flex;justify-content:space-between;align-items:center
}
.dash-logo{font-size:18px;font-weight:900;letter-spacing:-0.06em;text-transform:uppercase}
.dash-logo span{color:var(--accent)}
.dash-nav-right{display:flex;align-items:center;gap:20px}
.dash-tabs{display:flex;gap:2px;background:rgba(255,255,255,0.06);border-radius:8px;padding:4px}
.tab-btn{
  background:none;border:none;cursor:pointer;padding:7px 18px;border-radius:6px;
  font-family:var(--f);font-size:11px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--muted);transition:all 0.2s
}
.tab-btn.active{background:var(--dark2);color:var(--white)}
.dash-zips{display:flex;gap:10px;align-items:center}
.btn-zip{
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  padding:10px 20px;border-radius:6px;font-family:var(--f);
  font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  transition:all 0.2s
}
.btn-zip:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,69,0,0.35)}
.btn-zip:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── SECTIONS ─── */
.dash-section{display:none;padding:48px 40px}
.dash-section.visible{display:block}
.day-block{margin-bottom:64px}
.day-header{
  display:flex;align-items:center;gap:16px;
  margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)
}
.day-name{font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--white)}
.day-sep{flex:1;height:1px;background:var(--border)}
.day-count{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.pieces-row{display:flex;flex-wrap:wrap;gap:20px}
.section-title{font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--white);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}

/* ─── CARD ─── */
.piece-card{
  background:var(--dark1);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;
  display:flex;flex-direction:column
}
.piece-card:hover{border-color:rgba(255,69,0,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.card-top{
  padding:11px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:8px
}
.card-label{font-size:11px;font-weight:600;color:var(--white);letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tag{
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent);background:rgba(255,69,0,0.12);
  border-radius:100px;padding:2px 8px;flex-shrink:0
}
.card-preview{position:relative;overflow:hidden;cursor:default}
.card-hover{
  position:absolute;inset:0;opacity:0;transition:opacity 0.2s;
  background:rgba(10,10,10,0.06);display:flex;align-items:center;justify-content:center;
  pointer-events:none
}
.card-preview:hover .card-hover{opacity:1}
.card-hover span{
  background:var(--black);color:var(--white);
  font-size:9px;font-weight:700;padding:5px 12px;
  border-radius:100px;letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid var(--border)
}
.card-bottom{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;align-items:center;gap:8px
}
.btn-dl{
  background:var(--dark2);color:var(--white);border:1px solid var(--border);
  cursor:pointer;padding:7px 16px;border-radius:5px;font-family:var(--f);
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  transition:all 0.2s
}
.btn-dl:hover{background:var(--accent);border-color:var(--accent)}
.btn-dl:disabled{opacity:0.4;cursor:not-allowed}
.btn-swap{
  background:none;color:var(--muted);border:1px solid var(--border);
  cursor:pointer;padding:7px 14px;border-radius:5px;font-family:var(--f);
  font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  transition:all 0.2s
}
.btn-swap:hover{background:var(--dark2);color:var(--white);border-color:rgba(255,255,255,0.15)}

/* ─── ARTWORK BASE ─── */
.artwork{position:relative;overflow:hidden;font-family:var(--f);flex-shrink:0}
.artwork.post{width:270px;height:270px}
.artwork.story{width:270px;height:480px}
.artwork.dark{background:var(--black)}
.artwork.dark1{background:var(--dark1)}
.artwork.dark2{background:var(--dark2)}
.artwork.cream{background:var(--cream)}
.artwork.capturing [contenteditable]{outline:none!important;box-shadow:none!important}

/* ─── EDITABLE ─── */
[contenteditable="true"]{outline:none;transition:outline 0.15s;border-radius:2px;display:block}
[contenteditable="true"]:hover{outline:1px dashed rgba(255,69,0,0.5);outline-offset:2px;cursor:text}
[contenteditable="true"]:focus{outline:1.5px solid var(--accent);outline-offset:2px}

/* ─── SHARED PIECE ATOMS ─── */
.a-logo{position:absolute;top:14px;left:16px;font-size:8px;font-weight:900;letter-spacing:-0.04em;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.a-logo span{color:var(--accent)}
.a-logo.dk{color:rgba(10,10,10,0.35)}
.a-logo.dk span{color:var(--accent)}
.a-slide{position:absolute;top:14px;right:16px;font-size:8px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.3)}
.a-slide.dk{color:rgba(10,10,10,0.35)}
.a-sig{position:absolute;bottom:13px;left:16px;font-size:7px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25)}
.a-sig.dk{color:rgba(10,10,10,0.3)}
.a-sig.r{left:auto;right:16px}
.a-accent-bar{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.a-accent-bar.b{top:auto;bottom:0}
.a-orange-line{width:28px;height:2px;background:var(--accent);margin-bottom:10px}
.a-tag{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:block}
.a-divider{height:1px;background:var(--border);margin:10px 0}
.a-divider.dk{background:rgba(10,10,10,0.12)}

/* photo overlay */
.photo-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.photo-overlay{position:absolute;inset:0}
.photo-overlay.b2t{background:linear-gradient(to top,rgba(10,10,10,0.92) 0%,rgba(10,10,10,0.55) 55%,rgba(10,10,10,0.3) 100%)}
.photo-overlay.full{background:rgba(10,10,10,0.65)}
.photo-overlay.heavy{background:rgba(10,10,10,0.78)}

/* ─── POST LAYOUTS ─── */

/* P1 — Hero dark */
.ly-hero{position:absolute;bottom:32px;left:16px;right:16px}
.ly-hero .eyebrow{font-size:8px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:block}
.ly-hero .hl{font-size:32px;font-weight:900;line-height:0.96;letter-spacing:-0.04em;color:var(--white);margin-bottom:9px}
.ly-hero .sub{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.04em}

/* P2,3,4 — Numbered */
.ly-num{position:absolute;top:44px;bottom:30px;left:16px;right:16px;display:flex;flex-direction:column;justify-content:space-between}
.ly-num .num{font-size:72px;font-weight:900;letter-spacing:-0.06em;line-height:1;color:rgba(255,255,255,0.04);position:absolute;bottom:28px;right:12px;font-variant-numeric:tabular-nums}
.ly-num .hl{font-size:22px;font-weight:800;line-height:1.08;letter-spacing:-0.03em;color:var(--white);position:relative;z-index:1}
.ly-num .body{font-size:10.5px;font-weight:400;color:var(--muted);line-height:1.65;position:relative;z-index:1}

/* P5 — Resolution cream */
.ly-res{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 18px}
.ly-res .pre-line{font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.ly-res .hl-light{font-size:24px;font-weight:700;line-height:1.0;letter-spacing:-0.03em;color:rgba(10,10,10,0.45);margin-bottom:4px}
.ly-res .hl-bold{font-size:32px;font-weight:900;line-height:0.95;letter-spacing:-0.04em;color:var(--black);margin-bottom:18px}
.ly-res .hl-bold span{color:var(--accent)}
.ly-res .brand{font-size:8.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--black)}

/* P6 — Statement */
.ly-stmt{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 16px}
.ly-stmt .xl{font-size:36px;font-weight:900;line-height:0.95;letter-spacing:-0.05em;color:var(--white);margin-bottom:14px}
.ly-stmt .xl span{color:var(--accent)}
.ly-stmt .cta-hint{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

/* P7 — Cinematic photo */
.ly-cine{position:absolute;bottom:30px;left:16px;right:16px;z-index:2}
.ly-cine .eyebrow{font-size:8px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:block}
.ly-cine .big{font-size:44px;font-weight:900;line-height:0.9;letter-spacing:-0.05em;color:var(--white);margin-bottom:8px}
.ly-cine .sub{font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.55);letter-spacing:0.03em}

/* P8 — Quote dark */
.ly-qt{position:absolute;top:50%;left:16px;right:16px;transform:translateY(-50%)}
.ly-qt .pre{font-size:8px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:block}
.ly-qt .qt{font-size:17px;font-weight:700;line-height:1.25;letter-spacing:-0.02em;color:var(--white);padding-left:12px;border-left:2.5px solid var(--accent);margin-bottom:12px}
.ly-qt .body{font-size:10px;font-weight:400;color:var(--muted);line-height:1.6}

/* P9 — Stats */
.ly-stats{position:absolute;top:50%;left:16px;right:16px;transform:translateY(-50%)}
.ly-stats .stat-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.ly-stats .stat-num{font-size:36px;font-weight:900;letter-spacing:-0.05em;color:var(--accent)}
.ly-stats .stat-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.04em}
.ly-stats .concl{font-size:10px;font-weight:400;color:rgba(255,255,255,0.35);line-height:1.6;margin-top:10px}

/* P10 — CTA cream */
.ly-ctacream{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 18px}
.ly-ctacream .eyebrow{font-size:8px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:block}
.ly-ctacream .main{font-size:28px;font-weight:900;line-height:0.96;letter-spacing:-0.04em;color:var(--black);margin-bottom:16px}
.ly-ctacream .link{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)}

/* P11 — Photo editorial */
.ly-photo-ed{position:absolute;bottom:30px;left:16px;right:16px;z-index:2}
.ly-photo-ed .fade{font-size:20px;font-weight:700;line-height:1.05;letter-spacing:-0.03em;color:rgba(255,255,255,0.4);margin-bottom:4px}
.ly-photo-ed .bold{font-size:24px;font-weight:900;line-height:1.0;letter-spacing:-0.04em;color:var(--white)}
.ly-photo-ed .bold span{color:var(--accent)}

/* P12 — CTA dark bold */
.ly-ctadark{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 16px}
.ly-ctadark .big-num{font-size:72px;font-weight:900;letter-spacing:-0.06em;color:var(--accent);line-height:1;margin-bottom:6px}
.ly-ctadark .hl{font-size:24px;font-weight:900;line-height:1.0;letter-spacing:-0.04em;color:var(--white);margin-bottom:12px}
.ly-ctadark .sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.04em}

/* ─── STORY LAYOUTS ─── */

/* S13 — Poll photo */
.ly-spoll{position:absolute;bottom:44px;left:20px;right:20px;z-index:2}
.ly-spoll .q{font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-0.04em;color:var(--white);margin-bottom:20px}
.poll-opts{display:flex;flex-direction:column;gap:9px}
.poll-opt{
  border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;
  padding:11px 14px;font-size:12px;font-weight:700;
  color:rgba(255,255,255,0.85);letter-spacing:0.02em;text-align:center
}
.poll-opt.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* S14 — Text photo */
.ly-stxt{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%);z-index:2}
.ly-stxt .kicker{font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:block}
.ly-stxt .hl{font-size:28px;font-weight:900;line-height:1.04;letter-spacing:-0.04em;color:var(--white);margin-bottom:12px}
.ly-stxt .body{font-size:13px;font-weight:400;color:rgba(255,255,255,0.58);line-height:1.6}

/* S15 — Steps */
.ly-ssteps{position:absolute;top:60px;bottom:50px;left:20px;right:20px}
.ly-ssteps .title{font-size:24px;font-weight:900;line-height:1.05;letter-spacing:-0.04em;color:var(--white);margin-bottom:24px}
.step-list{display:flex;flex-direction:column;gap:14px}
.step-it{display:flex;gap:14px;align-items:flex-start}
.step-n{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--accent);min-width:18px;padding-top:2px}
.step-hl{font-size:13px;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:2px}
.step-sub{font-size:10px;font-weight:400;color:var(--muted);line-height:1.4}

/* S16 — Question cream */
.ly-sq{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%)}
.ly-sq .kicker{font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:block}
.ly-sq .q{font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-0.04em;color:var(--black);margin-bottom:22px}
.open-box{
  border:1.5px solid rgba(10,10,10,0.12);border-radius:8px;
  padding:13px 14px;font-size:12px;color:rgba(10,10,10,0.28);
  font-style:italic;font-weight:400
}

/* S17 — CTA dark */
.ly-scta{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-50%)}
.ly-scta .urgency{font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:block}
.ly-scta .msg{font-size:30px;font-weight:900;line-height:1.0;letter-spacing:-0.04em;color:var(--white);margin-bottom:8px}
.ly-scta .sub{font-size:12px;font-weight:400;color:var(--muted);line-height:1.55;margin-bottom:26px}
.cta-pill{
  display:block;background:var(--accent);color:#fff;text-align:center;
  padding:14px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase
}

/* ─── EXTRA LAYOUTS ─── */
.p-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.p-ov{position:absolute;inset:0}
.p-ov.b2t{background:linear-gradient(to top,rgba(10,10,10,0.88) 0%,rgba(10,10,10,0.35) 60%,rgba(10,10,10,0.05) 100%)}
.p-ov.t2b{background:linear-gradient(to bottom,rgba(10,10,10,0.75) 0%,rgba(10,10,10,0.1) 60%,rgba(10,10,10,0) 100%)}
.p-ov.mid{background:rgba(10,10,10,0.45)}
.p-ov.heavy{background:rgba(10,10,10,0.65)}
.ly-extra-b{position:absolute;bottom:26px;left:18px;right:18px;z-index:3}
.ly-extra-t{position:absolute;top:26px;left:18px;right:18px;z-index:3}
.ly-extra-c{position:absolute;top:50%;left:18px;right:18px;transform:translateY(-50%);z-index:3}
.ly-extra-b .phrase,.ly-extra-t .phrase,.ly-extra-c .phrase{
  font-size:22px;font-weight:900;line-height:1.08;letter-spacing:-0.04em;font-style:normal
}
.phrase.w{color:#fff}
.phrase.dk{color:var(--black)}
.extra-sig{font-size:7px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-top:10px;display:block}
.extra-sig.w{color:rgba(255,255,255,0.3)}
.extra-sig.dk{color:rgba(10,10,10,0.3)}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:32px;right:32px;z-index:999;
  background:var(--dark2);color:var(--white);border:1px solid var(--border);
  border-radius:8px;padding:14px 22px;font-size:13px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transform:translateY(12px);opacity:0;pointer-events:none;transition:all 0.3s
}
.toast.show{transform:translateY(0);opacity:1}

/* ─── REEL SECTION ─── */
.reel-layout{display:grid;grid-template-columns:290px 1fr;gap:48px;align-items:start}
.reel-preview-wrap{position:relative}
.reel-preview{width:270px;height:480px;position:relative;overflow:hidden;border-radius:16px;background:#0a0a0a;box-shadow:0 24px 80px rgba(0,0,0,0.7);flex-shrink:0}
.reel-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.7s ease;background-size:cover;background-position:center}
.reel-slide.active{opacity:1}
.reel-slide.zoom{animation:kenBurns 5s ease-out forwards}
@keyframes kenBurns{from{transform:scale(1)}to{transform:scale(1.06)}}
.reel-ov{position:absolute;inset:0}
.reel-text-wrap{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;padding:28px}
.reel-text-wrap.center{align-items:center;justify-content:center;text-align:center}
.reel-text-wrap.bottom{align-items:flex-start;justify-content:flex-end}
.reel-main-text{font-size:20px;font-weight:900;letter-spacing:-0.04em;color:#fff;line-height:1.1;opacity:0;transition:opacity 0.5s ease 0.3s}
.reel-main-text.visible{opacity:1}
.reel-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;transition:opacity 0.5s ease 0.3s}
.reel-logo-wrap.visible{opacity:1}
.reel-logo-big{font-size:38px;font-weight:900;letter-spacing:-0.06em;color:#fff;line-height:1}
.reel-logo-big span{color:#FF4500}
.reel-logo-div{width:32px;height:2px;background:#FF4500}
.reel-logo-url{font-size:9px;font-weight:600;letter-spacing:0.18em;color:rgba(255,255,255,0.5);text-transform:uppercase}
.reel-watermark{position:absolute;top:14px;left:16px;z-index:4;font-size:8px;font-weight:900;letter-spacing:-0.04em;color:rgba(255,255,255,0.4)}
.reel-watermark span{color:#FF4500}
.reel-counter{position:absolute;top:14px;right:16px;z-index:4;font-size:8px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.3)}
.reel-progress-outer{margin-top:14px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}

/* ─── SWAP IMAGE ─── */
function swapImg(pieceId, bgId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const url = URL.createObjectURL(e.target.files[0]);
    document.getElementById(bgId || 'bg-'+pieceId).style.backgroundImage = `url('${url}')`;
  };
  input.click();
}

/* ─── HTML2CANVAS CONFIG ─── */
async function captureArtwork(artwork) {
  return html2canvas(artwork, {
    scale: 4,
    useCORS: false,
    allowTaint: true,
    backgroundColor: '#0a0a0a',
    logging: false,
    imageTimeout: 0,
    width: artwork.offsetWidth,
    height: artwork.offsetHeight
  });
}

function canvasToBlob(canvas) {
  return new Promise((resolve) => {
    try {
      canvas.toBlob(blob => resolve(blob || null), 'image/png');
    } catch(e) {
      resolve(null);
    }
  });
}

/* ─── EXPORT SINGLE ─── */
async function dlPiece(id) {
  const artwork = document.querySelector(`#prev-${id} .artwork`);
  const btn = document.getElementById('dl-'+id);
  btn.textContent='...'; btn.disabled=true;
  artwork.classList.add('capturing');
  try {
    const canvas = await captureArtwork(artwork);
    artwork.classList.remove('capturing');
    const blob = await canvasToBlob(canvas);
    if (blob) { saveAs(blob, `horapunta-${id}.png`); showToast(`${id}.png descarregat`); }
    else { showToast('Error: obre el fitxer amb un servidor local'); }
  } catch(e) { artwork.classList.remove('capturing'); showToast('Error en la captura'); }
  btn.textContent='PNG'; btn.disabled=false;
}

/* ─── EXPORT ZIP ─── */
async function downloadZip(section) {
  const btnId = section==='semanal' ? 'zipSemanal' : 'zipExtra';
  const btn = document.getElementById(btnId);
  btn.textContent='Generant...'; btn.disabled=true;
  const zip = new JSZip();
  const cards = document.querySelectorAll(`[data-section="${section}"]`);
  let i=0, errors=0;
  for (const card of cards) {
    const id = card.dataset.id;
    const artwork = card.querySelector('.artwork');
    if (!artwork) continue;
    artwork.classList.add('capturing');
    try {
      const canvas = await captureArtwork(artwork);
      artwork.classList.remove('capturing');
      const blob = await canvasToBlob(canvas);
      if (blob) {
        zip.file(`${String(++i).padStart(2,'0')}-${id}.png`, blob);
        showToast(`${i}/${cards.length} processades...`);
      } else {
        errors++;
        artwork.classList.remove('capturing');
      }
    } catch(e) { artwork.classList.remove('capturing'); errors++; }
  }
  if (i === 0) {
    showToast('Cap imatge capturada. Obre el fitxer amb un servidor local.');
    btn.textContent = section==='semanal' ? 'ZIP Semanal' : 'ZIP Extra';
    btn.disabled = false;
    return;
  }
  const zb = await zip.generateAsync({type:'blob'});
  saveAs(zb, `horapunta-${section}.zip`);
  const msg = errors > 0 ? `ZIP descarregat (${errors} fotos omeses per CORS)` : 'ZIP descarregat!';
  showToast(msg);
  btn.textContent = section==='semanal' ? 'ZIP Semanal' : 'ZIP Extra';
  btn.disabled = false;
}

  const lastRendered = lastWords.join(' ') + (lastWords.length?' ':'')+accentWord || lastLine;
  return `<div class="reel-main-text${vis}" id="rtxt-${sc.id}" style="${sc.pos==='center'?'text-align:center':'text-align:left'}">
    ${sc.topText ? `<div style="${s}font-size:9px;font-weight:800;letter-spacing:0.2em;color:#FF4500;text-transform:uppercase;margin-bottom:10px">${sc.topText}</div>` : ''}
    <div style="${s}font-size:46px;font-weight:900;letter-spacing:-0.05em;color:#fff;line-height:0.88" contenteditable="true">
      ${restLines.map(l=>`${l}<br/>`).join('')}${lastRendered}
    </div>
    ${sc.pos==='bottom'?`<div style="width:44px;height:3px;background:#FF4500;margin-top:14px"></div>`:''}
  </div>`;
}

function reelInit() {
  const slidesEl = document.getElementById('reelSlides');
  const listEl   = document.getElementById('reelSceneList');
  slidesEl.innerHTML = '';
  listEl.innerHTML   = '';

  REEL_SCENES.forEach((sc, i) => {
    const slide = document.createElement('div');
    slide.className = 'reel-slide' + (i===0?' active':'');
    slide.id = 'rslide-'+sc.id;
    slide.style.backgroundImage = `url('${sc.img}')`;

    const ov = document.createElement('div');
    ov.className = 'reel-ov';
    ov.style.background = sc.overlay;

    const tw = document.createElement('div');
    tw.className = 'reel-text-wrap ' + sc.pos;
    tw.innerHTML = buildSlideInner(sc, i===0);

    // sync editable fields back to sc
    tw.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('input', () => {
        const field = el.dataset.field;
        if (field) sc[field] = el.textContent;
        else {
          if (sc.mainTextMuted && el === tw.querySelectorAll('[contenteditable]')[1]) sc.mainText = el.textContent;
          else if (sc.mainText !== undefined) sc.mainText = el.innerText;
        }
      });
    });

    slide.appendChild(ov);
    slide.appendChild(tw);
    slidesEl.appendChild(slide);

    // Scene card
    const card = document.createElement('div');
    card.className = 'reel-scene-card' + (i===0?' reel-active':'');
    card.id = 'rcard-'+sc.id;
    card.onclick = () => reelJumpTo(sc.start);

    const thumb = document.createElement('div');
    thumb.className = 'reel-thumb';
    thumb.style.backgroundImage = `url('${sc.img}')`;

    const info = document.createElement('div');
    info.className = 'reel-scene-info';
    info.innerHTML = `<div class="reel-scene-tag">Escena ${i+1} · ${sc.start}s–${Math.round((sc.end-sc.start)*10)/10}s</div>`;

    if (sc.isLogo) {
      info.innerHTML += `<div style="font-size:12px;font-weight:900;letter-spacing:-0.03em;color:#fff">HORA<span style="color:#FF4500">PUNTA</span></div>`;
    } else {
      const cardText = sc.design==='split'
        ? `${sc.bigA} ${sc.smallA} / ${sc.bigB} ${sc.smallB}`
        : (sc.mainTextMuted ? sc.mainTextMuted+' '+sc.mainText : sc.mainText||'');
      const inp = document.createElement('textarea');
      inp.className = 'reel-scene-input';
      inp.rows = 2;
      inp.value = cardText.replace(/\n/g,' ');
      info.appendChild(inp);
    }
    info.innerHTML += `<div class="reel-dur">${sc.end-sc.start}s</div>`;

    const btns = document.createElement('div');
    btns.className = 'reel-scene-btns';
    const swapBtn = document.createElement('button');
    swapBtn.className = 'reel-sm-btn';
    swapBtn.textContent = 'Foto';
    swapBtn.onclick = (e) => {
      e.stopPropagation();
      const inp2 = document.createElement('input');
      inp2.type='file'; inp2.accept='image/*';
      inp2.onchange = ev => {
        const url = URL.createObjectURL(ev.target.files[0]);
        sc.img = url;
        thumb.style.backgroundImage=`url('${url}')`;
        const sl = document.getElementById('rslide-'+sc.id);
        if(sl) sl.style.backgroundImage=`url('${url}')`;
      };
      inp2.click();
    };
    btns.appendChild(swapBtn);
    card.appendChild(thumb);
    card.appendChild(info);
    card.appendChild(btns);
    listEl.appendChild(card);
  });
}

function reelSwapImg(sc, thumb, idx) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const url = URL.createObjectURL(e.target.files[0]);
    sc.img = url;
    thumb.style.backgroundImage = `url('${url}')`;
    const slide = document.getElementById('rslide-'+sc.id);
    if (slide) slide.style.backgroundImage = `url('${url}')`;
  };
  input.click();
}

function reelJumpTo(t) {
  reelPause();
  reelElapsed = t;
  reelRender(t);
}

function reelToggle() {
  reelRunning ? reelPause() : reelPlay();
}

function reelPlay() {
  reelRunning = true;
  reelStart = performance.now() - reelElapsed * 1000;
  document.getElementById('reelPlayBtn').textContent = '⏸ Pausa';
  if (reelAudio) { reelAudio.currentTime = reelElapsed; reelAudio.play(); }
  function loop(now) {
    if (!reelRunning) return;
    reelElapsed = Math.min((now - reelStart) / 1000, REEL_TOTAL);
    reelRender(reelElapsed);
    if (reelElapsed >= REEL_TOTAL) { reelPause(); reelElapsed = REEL_TOTAL; return; }
    reelRAF = requestAnimationFrame(loop);
  }
  reelRAF = requestAnimationFrame(loop);
}

function reelPause() {
  reelRunning = false;
  if (reelRAF) cancelAnimationFrame(reelRAF);
  document.getElementById('reelPlayBtn').textContent = '▶ Play';
  if (reelAudio) reelAudio.pause();
}

function reelReset() {
  reelPause();
  reelElapsed = 0;
  reelRender(0);
}

function reelRender(t) {
  const prog = document.getElementById('reelProgress');
  const timeLabel = document.getElementById('reelTimeLabel');
  const counter = document.getElementById('reelCounter');
  prog.style.width = (t / REEL_TOTAL * 100) + '%';
  timeLabel.textContent = t.toFixed(1) + 's / ' + REEL_TOTAL + 's';

  let activeIdx = REEL_SCENES.length - 1;
  REEL_SCENES.forEach((sc, i) => { if (t >= sc.start && t < sc.end) activeIdx = i; });
  counter.textContent = (activeIdx+1) + '/' + REEL_SCENES.length;

  REEL_SCENES.forEach((sc, i) => {
    const slide = document.getElementById('rslide-'+sc.id);
    const txt   = document.getElementById('rtxt-'+sc.id);
    const card  = document.getElementById('rcard-'+sc.id);
    const isActive = i === activeIdx;
    if (slide) { slide.classList.toggle('active', isActive); if(isActive) slide.classList.add('zoom'); else slide.classList.remove('zoom'); }
    if (txt) txt.classList.toggle('visible', isActive);
    if (card) card.classList.toggle('reel-active', isActive);
  });
}

/* ─── REEL MUSIC ─── */
function loadReelMusic() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'audio/*';
  input.onchange = e => {
    if (reelAudio) { reelAudio.pause(); reelAudio = null; }
    const url = URL.createObjectURL(e.target.files[0]);
    reelAudio = new Audio(url);
    reelAudio.loop = false;
    document.getElementById('reelMusicName').textContent = e.target.files[0].name;
    document.getElementById('reelMusicToggle').style.display = '';
    document.getElementById('reelMusicToggle').textContent = '▶';
  };
  input.click();
}

function toggleReelMusic() {
  if (!reelAudio) return;
  const btn = document.getElementById('reelMusicToggle');
  if (reelAudio.paused) { reelAudio.play(); btn.textContent = '⏸'; }
  else { reelAudio.pause(); btn.textContent = '▶'; }
}

/* ─── REEL EXPORT FRAME PNG ─── */
async function exportReelFrame() {
  const preview = document.getElementById('reelPreview');
  showToast('Capturant frame...');
  try {
    const canvas = await html2canvas(preview, {
      scale:4, useCORS:false, allowTaint:true,
      backgroundColor:'#0a0a0a', logging:false, imageTimeout:0,
      width:preview.offsetWidth, height:preview.offsetHeight
    });
    const blob = await new Promise(r => canvas.toBlob(b=>r(b||null),'image/png'));
    if (blob) { saveAs(blob, 'horapunta-reel-frame.png'); showToast('Frame exportat!'); }
    else showToast('Error: usa Live Server');
  } catch(e) { showToast('Error en la captura'); }
}

/* ─── REEL EXPORT WEBM ─── */
function drawWrappedText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line+' '+w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  lines.forEach((l,i) => ctx.fillText(l, x, y + i*lineH));
  return lines.length;
}

async function exportReelWebM() {
  showToast('Preparant WebM... pot trigar ~30s');
  const btn = document.getElementById('btnReelWebm');
  btn.textContent = 'Generant...'; btn.disabled = true;

  const W = 1080, H = 1920, FPS = 30;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const imgs = {};
  await Promise.all(REEL_SCENES.map(sc => new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgs[sc.id] = img; res(); };
    img.onerror = () => res();
    img.src = sc.img;
  })));

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9' : 'video/webm';
  const stream = canvas.captureStream(FPS);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 10000000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size>0) chunks.push(e.data); };
  recorder.start(200);

  const totalFrames = Math.ceil(REEL_TOTAL * FPS);
  for (let f = 0; f <= totalFrames; f++) {
    const t = f / FPS;
    let sc = REEL_SCENES[REEL_SCENES.length-1];
    for (const s of REEL_SCENES) { if (t >= s.start && t < s.end) { sc = s; break; } }
    const progress = Math.min((t-sc.start)/(sc.end-sc.start), 1);
    const dur = sc.end - sc.start;
    const st = t - sc.start;
    let alpha = Math.min(st/0.35, 1, (dur-st)/0.35);
    alpha = Math.max(0, alpha);

    // BG
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    if (imgs[sc.id]) {
      const im = imgs[sc.id];
      const scl = 1 + progress*0.04;
      const r = Math.max(W/im.width, H/im.height)*scl;
      ctx.drawImage(im, (W-im.width*r)/2, (H-im.height*r)/2, im.width*r, im.height*r);
    }
    ctx.fillStyle = sc.overlay;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textBaseline = 'top';

    if (sc.isLogo) {
      ctx.textAlign = 'center';
      ctx.font = `900 ${H*0.075}px Inter,sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText('HORA', W/2, H*0.44);
      ctx.fillStyle = '#FF4500';
      ctx.fillRect(W/2-48, H*0.513, 96, 4);
      ctx.fillStyle = '#FF4500';
      ctx.font = `900 ${H*0.075}px Inter,sans-serif`;
      ctx.fillText('PUNTA', W/2, H*0.525);
      ctx.fillStyle = 'rgba(255,255,255,0.38)';
      ctx.font = `600 ${H*0.018}px Inter,sans-serif`;
      ctx.fillText('ESHORAPUNTA.COM', W/2, H*0.61);

    } else if (sc.design === 'split') {
      ctx.textAlign = 'center';
      const fBig = H*0.078, fSmall = H*0.032;
      ctx.font = `900 ${fBig}px Inter,sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText(sc.bigA, W/2, H*0.415);
      ctx.font = `300 ${fSmall}px Inter,sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText(sc.smallA, W/2, H*0.415+fBig*1.05);
      ctx.fillStyle = '#FF4500';
      ctx.fillRect(W/2-36, H*0.415+fBig*1.05+fSmall*1.3, 72, 3);
      ctx.font = `300 ${fSmall}px Inter,sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText(sc.smallB, W/2, H*0.415+fBig*1.05+fSmall*1.3+10);
      ctx.font = `900 ${fBig}px Inter,sans-serif`;
      ctx.fillStyle = '#FF4500';
      ctx.fillText(sc.bigB, W/2, H*0.415+fBig*1.05+fSmall*2.8+10);

    } else if (sc.mainTextMuted) {
      const yBase = H*0.78;
      ctx.textAlign = 'left';
      if (sc.topText) {
        ctx.font = `800 ${H*0.018}px Inter,sans-serif`;
        ctx.fillStyle = '#FF4500';
        ctx.fillText(sc.topText.toUpperCase(), W*0.082, yBase - H*0.22);
      }
      ctx.font = `900 ${H*0.076}px Inter,sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      drawWrappedText(ctx, sc.mainTextMuted, W*0.082, yBase-H*0.165, W*0.84, H*0.085);
      ctx.fillStyle = '#fff';
      const n = drawWrappedText(ctx, sc.mainText, W*0.082, yBase-H*0.075, W*0.84, H*0.085);
      ctx.fillStyle = '#FF4500';
      ctx.fillRect(W*0.082, yBase-H*0.075+n*H*0.09+10, 52, 4);

    } else {
      const yBase = sc.pos==='bottom' ? H*0.75 : H*0.44;
      if (sc.topText) {
        ctx.textAlign = sc.pos==='center' ? 'center' : 'left';
        ctx.font = `800 ${H*0.018}px Inter,sans-serif`;
        ctx.fillStyle = '#FF4500';
        ctx.fillText(sc.topText.toUpperCase(), sc.pos==='center'?W/2:W*0.082, yBase-H*0.175);
      }
      ctx.font = `900 ${H*0.095}px Inter,sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = sc.pos==='center' ? 'center' : 'left';
      const xPos = sc.pos==='center' ? W/2 : W*0.082;
      const lines2 = sc.mainText.split('\n');
      lines2.forEach((line,li) => {
        const words2 = line.split(' ');
        if (sc.mainAccent && li===lines2.length-1) {
          const last = words2.pop();
          const rest = words2.join(' ')+(words2.length?' ':'');
          ctx.fillStyle='#fff';
          const rw = rest ? ctx.measureText(rest).width : 0;
          if (sc.pos==='center') {
            const full = rest+last;
            const fw = ctx.measureText(full).width;
            ctx.fillText(rest, xPos - ctx.measureText(last).width/2, yBase+li*H*0.105);
            ctx.fillStyle='#FF4500';
            ctx.fillText(last, xPos + (fw/2 - ctx.measureText(last).width), yBase+li*H*0.105);
          } else {
            ctx.fillText(rest, xPos, yBase+li*H*0.105);
            ctx.fillStyle='#FF4500';
            ctx.fillText(last, xPos+rw, yBase+li*H*0.105);
          }
        } else {
          ctx.fillStyle='#fff';
          ctx.fillText(line, xPos, yBase+li*H*0.105);
        }
      });
      if (sc.pos==='bottom') {
        ctx.fillStyle='#FF4500';
        ctx.fillRect(W*0.082, yBase+lines2.length*H*0.105+14, 52, 4);
      }
    }
    ctx.restore();

    // watermark
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.font=`900 ${H*0.016}px Inter,sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillStyle='#fff'; ctx.fillText('Hora', W*0.055, H*0.022);
    ctx.fillStyle='#FF4500';
    ctx.fillText('Punta', W*0.055+ctx.measureText('Hora').width+2, H*0.022);
    ctx.restore();

    if (f % 10 === 0) await new Promise(r => setTimeout(r, 0));
  }

  recorder.stop();
  await new Promise(r => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, {type:'video/webm'});
      saveAs(blob, 'horapunta-reel.webm');
      showToast('WebM exportat! Converteix a MP4 amb handbrake.fr');
      btn.textContent = 'Export WebM'; btn.disabled = false;
      r();
    };
  });
}

/* ─── INIT REEL ─── */
reelInit();
reelRender(0);
</script>
